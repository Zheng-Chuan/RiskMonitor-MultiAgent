services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: riskmonitor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riskmonitor}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=223344
      --log-bin=mysql-bin
      --binlog_format=ROW
      --binlog_row_image=FULL
      --expire_logs_days=7
    healthcheck:
      test: ["CMD", "sh", "-lc", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - riskmonitor-network
    restart: unless-stopped

  # Redis - 统一内存存储
  redis:
    image: redis:7-alpine
    container_name: riskmonitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - riskmonitor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Chroma - 向量数据库（用于知识检索）
  chroma:
    image: chromadb/chroma:latest
    container_name: riskmonitor-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - riskmonitor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - knowledge  # 可选启动

  # PageIndex - 长期语义记忆 (假设服务)
  # 注意: PageIndex 是一个假设的服务，需要根据实际部署情况配置
  # 如果 PageIndex 是外部服务，请在 .env 中配置 PAGE_INDEX_URL
  pageindex:
    image: pageindex/pageindex:latest
    container_name: riskmonitor-pageindex
    environment:
      PAGE_INDEX_API_KEY: ${PAGE_INDEX_API_KEY:-}
      PAGE_INDEX_ENABLED: ${PAGE_INDEX_ENABLED:-false}
    ports:
      - "8080:8080"
    volumes:
      - pageindex_data:/data
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - longterm  # 可选启动

  # RiskMonitor MultiAgent MCP 服务
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-multiagent
    environment:
      # MySQL 配置
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riskmonitor}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      # Redis 配置 (统一内存)
      REDIS_URL: redis://redis:6379/0
      MEMORY_TTL_S: 86400
      MEMORY_MAX_LEN: 2000
      # PageIndex 配置 (可选)
      PAGE_INDEX_ENABLED: ${PAGE_INDEX_ENABLED:-false}
      PAGE_INDEX_URL: ${PAGE_INDEX_URL:-http://pageindex:8080}
      PAGE_INDEX_API_KEY: ${PAGE_INDEX_API_KEY:-}
      # 应用配置
      APP_ENV: production
      LOG_LEVEL: INFO
      MCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - riskmonitor-network
    restart: unless-stopped

  # 测试运行器
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-test
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riskmonitor}
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: test
      LOG_LEVEL: INFO
      PAGE_INDEX_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - riskmonitor-network
    entrypoint: ["bash", "-lc"]
    command: ["pytest tests/unit/ -v"]
    profiles:
      - dev

  # phpMyAdmin (数据库管理界面，可选)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: riskmonitor-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-admin}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      UPLOAD_LIMIT: 300M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  pageindex_data:
    driver: local

networks:
  riskmonitor-network:
    driver: bridge
