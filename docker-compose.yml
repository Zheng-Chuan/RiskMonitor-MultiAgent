services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: riskmonitor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "sh", "-lc", "mysqladmin ping -h localhost -u \"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - riskmonitor-network
    restart: unless-stopped

  # RiskMonitor MultiAgent MCP 服务
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-multiagent
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      APP_ENV: production
      LOG_LEVEL: INFO
      MCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # 测试运行器
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-test
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      APP_ENV: test
      LOG_LEVEL: INFO
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - riskmonitor-network
    entrypoint: ["bash", "-lc"]
    command: ["pytest -q"]
    profiles:
      - dev

  # phpMyAdmin（数据库管理界面，可选）
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: riskmonitor-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:?MYSQL_USER is required}
      PMA_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      UPLOAD_LIMIT: 300M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  mysql_data:
    driver: local

networks:
  riskmonitor-network:
    driver: bridge
