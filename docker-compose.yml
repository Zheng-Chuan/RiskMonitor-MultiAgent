services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: riskmonitor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=223344
      --log-bin=mysql-bin
      --binlog_format=ROW
      --binlog_row_image=FULL
      --expire_logs_days=7
    healthcheck:
      test: ["CMD", "sh", "-lc", "mysqladmin ping -h localhost -u \"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - riskmonitor-network
    restart: unless-stopped

  # RiskMonitor MultiAgent MCP 服务
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-multiagent
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      APP_ENV: production
      LOG_LEVEL: INFO
      MCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # 测试运行器
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskmonitor-test
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      APP_ENV: test
      LOG_LEVEL: INFO
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - riskmonitor-network
    entrypoint: ["bash", "-lc"]
    command: ["pytest -q"]
    profiles:
      - dev

  # phpMyAdmin（数据库管理界面，可选）
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: riskmonitor-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:?MYSQL_USER is required}
      PMA_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      UPLOAD_LIMIT: 300M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - tools

  # Kafka 生态(Week 6)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: riskmonitor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - infra

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: riskmonitor-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "29092:29092"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - infra

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: riskmonitor-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8081:8080"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - infra

  debezium:
    image: debezium/connect:2.6
    container_name: riskmonitor-debezium
    depends_on:
      - kafka
      - mysql
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: risk.connect.configs
      OFFSET_STORAGE_TOPIC: risk.connect.offsets
      STATUS_STORAGE_TOPIC: risk.connect.statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      OFFSET_FLUSH_INTERVAL_MS: 10000
    ports:
      - "8083:8083"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - infra

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: riskmonitor-schema-registry
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "8085:8085"
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - infra

  chroma:
    image: chromadb/chroma:latest
    container_name: riskmonitor-chroma
    environment:
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - riskmonitor-network
    restart: unless-stopped
    profiles:
      - kb

volumes:
  mysql_data:
    driver: local
  chroma_data:
    driver: local

networks:
  riskmonitor-network:
    driver: bridge
